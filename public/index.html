<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <!-- Pengaturan viewport responsif standar untuk HP dan Laptop -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>L Carwash</title>
  <style>
    /* Reset standar agar responsif di semua perangkat */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%; /* Pastikan tinggi mengikuti perangkat */
      background-color: #f8fafc;
      font-family: sans-serif;
      
      /* Ini adalah cara paling natural untuk mematikan pull-to-refresh di browser modern */
      overscroll-behavior-y: none;
      overscroll-behavior-x: none;
      
      /* Hilangkan highlight biru saat di-tap di HP */
      -webkit-tap-highlight-color: transparent;
    }

    /* Kontainer utama React */
    #root {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* Sembunyikan scrollbar bawaan agar aplikasi terlihat rapi (opsional) */
    ::-webkit-scrollbar {
      width: 0px;
      background: transparent;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <!-- Memanggil Tailwind CSS untuk desain responsif -->
  <script src="https://cdn.tailwindcss.com"></script>
</body>
</html>
