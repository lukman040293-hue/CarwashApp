<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <!-- Pengaturan agar tampilan pas di layar HP dan tidak bisa di-zoom manual -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>L Carwash</title>
  <style>
    /* Dasar aplikasi: Memenuhi layar tanpa scroll di level paling luar */
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      width: 100%;
      background-color: #f8fafc;
      overflow: hidden; /* Mencegah pull-to-refresh browser */
      overscroll-behavior-y: none;
      position: fixed; /* Mengunci posisi body agar tidak bergeser */
    }

    #root {
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    /* Pastikan kontainer utama di dalam React bisa scroll */
    /* Kita mengaktifkan kembali scroll di sini */
    .scroll-container {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch; /* Scroll halus di iOS */
      touch-action: pan-y; /* Hanya izinkan geser atas-bawah */
    }

    /* Sembunyikan scrollbar agar terlihat bersih seperti aplikasi asli */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <!-- Script Pengunci Refresh yang lebih cerdas -->
  <script>
    let startY = 0;

    // Menangkap titik awal sentuhan
    document.addEventListener('touchstart', function(e) {
      startY = e.touches[0].pageY;
    }, { passive: true });

    // Mencegah tarikan refresh hanya jika berada di paling atas
    document.addEventListener('touchmove', function(e) {
      const scrollTarget = document.querySelector('.overflow-y-auto') || document.body;
      const scrollTop = scrollTarget.scrollTop;
      const moveY = e.touches[0].pageY;
      const isDraggingDown = moveY > startY;

      // Jika user tarik ke bawah saat posisi sudah paling atas, blokir refresh
      if (scrollTop <= 0 && isDraggingDown) {
        if (e.cancelable) e.preventDefault();
      }
    }, { passive: false });
  </script>

  <!-- Library Tailwind CSS untuk desain -->
  <script src="https://cdn.tailwindcss.com"></script>
</body>
</html>
