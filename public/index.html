<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <!-- viewport-fit=cover adalah kunci utama untuk membuat background tembus ke ujung layar -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  
  <!-- Mengubah warna status bar atas HP menjadi senada dengan header aplikasi -->
  <meta name="theme-color" content="#24429A" />
  
  <title>L Carwash</title>
  <style>
    /* CSS Bersih untuk performa maksimal */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #f8fafc;
      overscroll-behavior-y: contain;
      -webkit-tap-highlight-color: transparent;
    }

    #root {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      
      /* MEMBERIKAN JARAK AMAN (SAFE AREA) */
      /* Agar background tembus sampai ujung, tapi teks/tombol tidak tertimpa navigasi HP */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdn.tailwindcss.com"></script>
</body>
</html>
