<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <!-- Pengaturan viewport untuk mencegah zoom dan memastikan pas di layar HP -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>L Carwash</title>
  <style>
    /* Kunci total area terluar agar tidak bisa ditarik sama sekali */
    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #f8fafc;
      position: fixed;
      /* Mematikan fitur overscroll di level browser */
      overscroll-behavior-y: none;
      overscroll-behavior: none;
      /* Mematikan aksi sentuh default browser */
      touch-action: none;
    }

    #root {
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Mengaktifkan kembali scroll HANYA pada area konten aplikasi */
    /* Kita memberikan izin pan-y (geser atas bawah) secara spesifik */
    .overflow-y-auto {
      -webkit-overflow-scrolling: touch !important;
      overscroll-behavior: contain !important;
      touch-action: pan-y !important;
    }

    /* Menghilangkan highlight biru saat elemen diklik di Android */
    * {
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script>
    (function() {
      let lastY = 0;

      // Mendeteksi awal sentuhan
      document.addEventListener('touchstart', function(e) {
        lastY = e.touches[0].pageY;
      }, { passive: false });

      // Kontrol penuh pada pergerakan jari
      document.addEventListener('touchmove', function(e) {
        // Cari elemen yang sedang aktif di-scroll di dalam React (App.js)
        const scrollable = document.querySelector('.overflow-y-auto');
        
        if (scrollable) {
          const scrollTop = scrollable.scrollTop;
          const currentY = e.touches[0].pageY;
          const isDraggingDown = currentY > lastY;

          // JIKA di posisi paling atas dan ditarik ke bawah -> BLOKIR TOTAL
          if (scrollTop <= 0 && isDraggingDown) {
            if (e.cancelable) e.preventDefault();
          }
        } else {
          // Jika tidak ada area scrollable, jangan izinkan tarikan sama sekali
          if (e.cancelable) e.preventDefault();
        }
        
        lastY = e.touches[0].pageY;
      }, { passive: false }); // Penting: passive false agar preventDefault ditaati browser

      // Tambahan: Pastikan layar tidak mental saat mencapai batas (rubber banding)
      document.addEventListener('touchend', function(e) {
        lastY = 0;
      }, { passive: false });
    })();
  </script>

  <!-- Memanggil Tailwind CSS untuk desain -->
  <script src="https://cdn.tailwindcss.com"></script>
</body>
</html>
