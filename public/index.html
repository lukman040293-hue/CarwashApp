<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <!-- Pengaturan agar tampilan pas di layar HP dan tidak bisa di-zoom manual -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>L Carwash</title>
  <style>
    /* Memastikan aplikasi memenuhi layar penuh dan mematikan fitur tarik-refresh */
    html, body, #root {
      height: 100%;
      margin: 0;
      padding: 0;
      width: 100%;
      background-color: #f8fafc;
      overflow: hidden; /* Mengunci scroll utama agar tidak terjadi pull-to-refresh */
      
      /* Kunci CSS: Mematikan tarikan refresh browser di Android/iOS */
      overscroll-behavior-y: none; 
      overscroll-behavior: none;
      
      /* Mematikan aksi sentuh default pada level root agar tidak men-trigger sistem browser */
      touch-action: none;
    }

    /* Pengaturan agar aplikasi terasa seperti aplikasi native */
    body {
      -webkit-overflow-scrolling: touch;
      position: fixed; 
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      user-select: none; /* Mencegah seleksi teks yang tidak disengaja saat scroll */
      -webkit-user-select: none;
    }

    /* Memastikan area konten tetap bisa di-scroll secara mandiri */
    /* Kita mengaktifkan kembali scroll hanya untuk arah vertikal di dalam aplikasi */
    #root > div {
      touch-action: pan-y;
      height: 100%;
      overflow-y: auto;
    }

    /* Sembunyikan scrollbar tapi tetap bisa digeser */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <!-- Script Pengunci Refresh Super Kuat -->
  <script>
    // 1. Mencegah tarikan pada dokumen secara global
    document.addEventListener('touchmove', function(e) {
      if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
        // Cek apakah elemen yang di-scroll adalah bagian dari konten yang boleh scroll
        const scrollableElement = document.querySelector('.overflow-y-auto') || document.querySelector('#root > div');
        
        if (scrollableElement) {
          const isAtTop = scrollableElement.scrollTop === 0;
          const isScrollingUp = e.touches[0].pageY > startY;

          // Jika di posisi paling atas dan mencoba tarik ke bawah, kunci!
          if (isAtTop && isScrollingUp) {
            if (e.cancelable) e.preventDefault();
          }
        } else {
          if (e.cancelable) e.preventDefault();
        }
      }
    }, { passive: false });

    let startY = 0;
    document.addEventListener('touchstart', function(e) {
      startY = e.touches[0].pageY;
    }, { passive: true });

    // 2. Mencegah "Bounce effect" pada iOS dan Android WebView tertentu
    window.addEventListener('scroll', function(e) {
      if (window.scrollY > 0) window.scrollTo(0, 0);
    });
  </script>

  <!-- Library Tailwind CSS untuk desain -->
  <script src="https://cdn.tailwindcss.com"></script>
</body>
</html>
