<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <!-- Pengaturan agar tampilan pas di layar HP dan tidak bisa di-zoom manual -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>L Carwash</title>
  <style>
    /* Mengunci total layar paling luar */
    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden; /* Mencegah scroll di level browser */
      background-color: #f8fafc;
      position: fixed; /* Mencegah tarikan layar (pull-to-refresh) */
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #root {
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Area yang boleh di-scroll (dipicu oleh class tailwind flex-1 overflow-y-auto di App.js) */
    .overflow-y-auto {
      -webkit-overflow-scrolling: touch !important;
      overscroll-behavior: contain !important;
      touch-action: pan-y !important;
    }

    /* Hilangkan highlight biru saat klik di Android */
    * {
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <!-- Script Anti-Refresh Super Kuat -->
  <script>
    (function() {
      let startY = 0;

      // Menangkap titik awal sentuhan
      document.addEventListener('touchstart', function(e) {
        startY = e.touches[0].pageY;
      }, { passive: true });

      // Mencegah tarikan refresh hanya jika berada di paling atas
      document.addEventListener('touchmove', function(e) {
        // Cari elemen yang sedang di-scroll (biasanya div dengan class overflow-y-auto)
        const scrollable = document.querySelector('.overflow-y-auto') || document.body;
        const scrollTop = scrollable.scrollTop;
        const moveY = e.touches[0].pageY;
        const isDraggingDown = moveY > startY;

        // JIKA posisi sudah di paling atas DAN user mencoba tarik ke bawah
        if (scrollTop <= 0 && isDraggingDown) {
          // BLOKIR aksi refresh browser
          if (e.cancelable) {
            e.preventDefault();
          }
        }
      }, { passive: false }); // Penting: passive false agar preventDefault bekerja
    })();
  </script>

  <!-- Library Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
</body>
</html>
