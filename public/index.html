<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <!-- Pengaturan viewport untuk mencegah zoom dan memastikan pas di layar HP -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>L Carwash</title>
  <style>
    /* Kunci total area terluar agar tidak bisa ditarik sama sekali */
    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #f8fafc;
      position: fixed;
      /* Mematikan fitur overscroll di level browser */
      overscroll-behavior-y: none;
      overscroll-behavior: none;
      /* Mematikan aksi sentuh default browser */
      touch-action: none;
    }

    #root {
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Mengaktifkan kembali scroll HANYA pada area konten aplikasi */
    .overflow-y-auto {
      -webkit-overflow-scrolling: touch !important;
      overscroll-behavior: contain !important;
      touch-action: pan-y !important;
    }

    /* Menghilangkan highlight biru saat elemen diklik di Android */
    * {
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script>
    (function() {
      // TEKNIK BARU: 1px Scroll Hack
      // Memaksa area scroll untuk tidak pernah menyentuh angka 0 tepat
      // sehingga browser tidak menganggap ini sebagai tarikan halaman (pull-to-refresh)
      
      document.addEventListener('touchstart', function(e) {
        const scrollable = document.querySelector('.overflow-y-auto');
        if (scrollable) {
          if (scrollable.scrollTop === 0) {
            scrollable.scrollTop = 1;
          } else if (scrollable.scrollHeight === scrollable.scrollTop + scrollable.offsetHeight) {
            scrollable.scrollTop = scrollable.scrollTop - 1;
          }
        }
      }, { passive: true });

      // Pencegahan tambahan untuk gerakan menarik ke bawah
      let lastY = 0;
      document.addEventListener('touchstart', function(e) {
        lastY = e.touches[0].pageY;
      }, { passive: false });

      document.addEventListener('touchmove', function(e) {
        const scrollable = document.querySelector('.overflow-y-auto');
        if (scrollable) {
          const scrollTop = scrollable.scrollTop;
          const currentY = e.touches[0].pageY;
          const isDraggingDown = currentY > lastY;

          // Jika posisi di 1px (posisi "palsu" paling atas) dan ditarik ke bawah, kunci!
          if (scrollTop <= 1 && isDraggingDown) {
            if (e.cancelable) e.preventDefault();
          }
        }
        lastY = e.touches[0].pageY;
      }, { passive: false });
    })();
  </script>

  <!-- Memanggil Tailwind CSS untuk desain -->
  <script src="https://cdn.tailwindcss.com"></script>
</body>
</html>
