<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <!-- Pengaturan agar tampilan pas di layar HP dan tidak bisa di-zoom manual -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>L Carwash</title>
  <style>
    /* Memastikan aplikasi memenuhi layar penuh dan mematikan fitur tarik-refresh */
    html, body, #root {
      height: 100%;
      margin: 0;
      padding: 0;
      width: 100%;
      background-color: #f8fafc;
      overflow: hidden; /* Mengunci scroll utama agar tidak terjadi pull-to-refresh */
      
      /* Kunci CSS: Mematikan tarikan refresh browser di Android/iOS */
      overscroll-behavior-y: none; 
      overscroll-behavior: none;
      
      /* Tambahan: Mematikan aksi sentuh default pada body agar tidak men-trigger sistem browser */
      touch-action: none;
    }

    /* Pengaturan scroll halus untuk perangkat sentuh */
    body {
      -webkit-overflow-scrolling: touch;
      position: fixed; /* Mencegah pergeseran seluruh body saat mencapai batas scroll */
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    /* Sembunyikan scrollbar tapi tetap bisa digeser (untuk tampilan minimalis) */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Memastikan area konten tetap bisa di-scroll secara mandiri */
    /* Karena body dikunci touch-action: none, kita harus mengaktifkannya kembali di kontainer konten */
    #root > div {
      touch-action: pan-x pan-y;
    }

    :root {
      --safe-area-inset-bottom: env(safe-area-inset-bottom);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <!-- Script Pengunci Refresh (JavaScript) -->
  <script>
    // Mencegah pull-to-refresh secara paksa lewat deteksi gerakan sentuh
    let startY = 0;
    document.addEventListener('touchstart', (e) => {
      startY = e.touches[0].pageY;
    }, { passive: false });

    document.addEventListener('touchmove', (e) => {
      const y = e.touches[0].pageY;
      // Jika pengguna menarik ke bawah (y > startY) dan posisi scroll ada di paling atas
      if (y > startY && window.scrollY <= 0) {
        e.preventDefault();
      }
    }, { passive: false });
  </script>

  <!-- Library Tailwind CSS untuk desain -->
  <script src="https://cdn.tailwindcss.com"></script>
</body>
</html>
